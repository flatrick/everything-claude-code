interface:
  display_name: "Tool Setup Verifier"
  short_description: "Smoke-check MDT tool adapters and workflow contracts"
  brand_color: "#0EA5E9"
  default_prompt: "Run a quick MDT smoke check. In the MDT repo, use `mdt verify tool-setups`, `mdt smoke tool-setups --tool codex`, and `mdt smoke workflows --tool codex`. In an installed Codex setup, use the equivalent `node ~/.codex/mdt/scripts/mdt.js ...` commands, then summarize PASS/FAIL/SKIP with the next remediation step."
policy:
  allow_implicit_invocation: true
